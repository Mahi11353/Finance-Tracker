{% extends "base.html" %}
{% block title %}Edit Expense — Spendora{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update the details of this transaction.</p>
        </div>
        <div class="auth-card">
            {% if error %}
                <div class="auth-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <input type="hidden" name="csrf_token" value="{{ session['csrf_token'] }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input class="form-input" type="number" id="amount" name="amount"
                           step="0.01" min="0.01" required
                           value="{{ form.amount if form else expense.amount }}">
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select class="form-input" id="category" name="category" required>
                        <option value="">Select a category</option>
                        {% set sel_cat = form.get('category') if form else expense.category %}
                        {% for cat in categories %}
                            <option value="{{ cat }}" {% if sel_cat == cat %}selected{% endif %}>
                                {{ cat }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input class="form-input" type="date" id="date" name="date" required
                           value="{{ form.date if form else expense.date }}">
                </div>
                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <input class="form-input" type="text" id="description" name="description"
                           maxlength="200"
                           value="{{ form.description if form else (expense.description or '') }}">
                </div>
                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
            <p class="auth-switch"><a href="{{ url_for('profile') }}">Cancel</a></p>
        </div>
    </div>
</section>
{% endblock %}
